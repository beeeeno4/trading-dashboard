<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #ffffff;
  --bg1: #f8f9fb;
  --bg2: #f2f3f7;
  --bg3: #e8eaf0;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --green: #00a87a;
  --red: #e03050;
  --yellow: #d48a10;
  --blue: #2a7de1;
  --muted: #a0a8bf;
  --text2: #6b7490;
  --text1: #3a4060;
  --dark: #1a1e2e;
}

html, body { background: var(--bg0); color: var(--dark); font-family: 'Syne', sans-serif; min-height: 100dvh; }
.app { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 32px; height: 32px; background: var(--dark); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-mark span { font-size: 10px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.logo-name { font-size: 17px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 10px; }
.badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text2); }
.badge.live { border-color: rgba(0,168,122,0.4); color: var(--green); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: blink 1.6s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
.card { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
.card-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.card-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: var(--dark); }
.card-value.green { color: var(--green); }
.card-value.red { color: var(--red); }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.chart-section, .pnl-section, .trades-section {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 28px;
}
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.chart-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: var(--text1); }
.chart-tabs { display: flex; gap: 4px; }
.tab { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.15s; }
.tab:hover { color: var(--text1); }
.tab.active { background: var(--bg3); border-color: var(--border2); color: var(--dark); }
.chart-wrap { position: relative; height: 260px; }
.pnl-wrap { position: relative; height: 200px; }

.trade-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
.trade-row.header-row { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
.trade-row:last-child { border-bottom: none; }
.trade-name { font-weight: 700; color: var(--dark); }
.trade-detail { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
.tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; margin-right: 3px; }
.tag.long { background: rgba(0,168,122,0.12); color: var(--green); }
.tag.closed { background: rgba(160,168,191,0.2); color: var(--muted); }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.pos { color: var(--green); font-weight: 600; }
.neg { color: var(--red); font-weight: 600; }

.state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 160px; gap: 12px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.6; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: var(--red); font-size: 11px; font-family: 'IBM Plex Mono', monospace; background: rgba(224,48,80,0.06); border-radius: 8px; padding: 12px 16px; max-width: 400px; }

.refresh-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 5px 12px; font-size: 11px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }
.refresh-btn:hover { background: var(--bg2); color: var(--dark); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-mark"><span>MY</span></div>
      <span class="logo-name">Trading Dashboard</span>
    </div>
    <div class="header-right">
      <span class="badge live"><span class="dot"></span>Notion Live</span>
      <button class="refresh-btn" onclick="loadAll()"><i class="ti ti-refresh" style="font-size:14px"></i> 새로고침</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">Total Balance</div><div class="card-value" id="c-balance">—</div><div class="card-sub" id="c-balance-sub">자산 스냅샷 기준</div></div>
    <div class="card"><div class="card-label">Realized PnL</div><div class="card-value" id="c-pnl">—</div><div class="card-sub" id="c-pnl-sub">매도 손익 합계</div></div>
    <div class="card"><div class="card-label">Win Rate</div><div class="card-value" id="c-winrate">—</div><div class="card-sub" id="c-winrate-sub">승 / 패</div></div>
    <div class="card"><div class="card-label">Total Trades</div><div class="card-value" id="c-trades">—</div><div class="card-sub">전체 매매 횟수</div></div>
  </div>

  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">📈 자산 변화</span>
      <div class="chart-tabs">
        <button class="tab active" onclick="setRange(this,7)">1W</button>
        <button class="tab" onclick="setRange(this,30)">1M</button>
        <button class="tab" onclick="setRange(this,90)">3M</button>
        <button class="tab" onclick="setRange(this,0)">All</button>
      </div>
    </div>
    <div class="chart-wrap" id="asset-wrap">
      <div class="state-msg"><div class="spinner"></div><span>Notion에서 불러오는 중...</span></div>
    </div>
  </div>

  <div class="pnl-section">
    <div class="chart-header"><span class="chart-title">💹 종목별 손익</span></div>
    <div class="pnl-wrap" id="pnl-wrap">
      <div class="state-msg"><div class="spinner"></div><span>매매 기록 불러오는 중...</span></div>
    </div>
  </div>

  <div class="trades-section" style="margin-bottom:28px">
    <div class="chart-header">
      <span class="chart-title">⚡ 현재 포지션 (OKX Live)</span>
      <button class="refresh-btn" onclick="loadPositions()"><i class="ti ti-refresh" style="font-size:14px"></i> 갱신</button>
    </div>
    <div id="positions-wrap">
      <div class="state-msg"><div class="spinner"></div><span>OKX에서 불러오는 중...</span></div>
    </div>
  </div>

  <div class="trades-section">
    <div class="chart-title" style="margin-bottom:16px">📋 최근 매매 내역</div>
    <div id="trades-table"><div class="state-msg"><div class="spinner"></div><span>불러오는 중...</span></div></div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const TOKEN       = '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';
const DB_SNAPSHOT = 'cb91b08144a94aa497d464a48ecb4200';
const DB_TRADES   = '57ed9cdb27764668add600b689ff223a';
const PROXY       = 'https://corsproxy.io/?';

const OKX_KEY        = '10b6318b-d6ae-4cc3-8209-3a2fc1bacf9f';
const OKX_SECRET     = 'F2DCFEFD3C4A0C804B12F6728CF81D7D';
const OKX_PASSPHRASE = '0401Jungbin@';

async function okxRequest(path) {
  const ts = new Date().toISOString();
  const msg = ts + 'GET' + path;
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(OKX_SECRET), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
  const b64 = btoa(String.fromCharCode(...new Uint8Array(sig)));
  const url = PROXY + encodeURIComponent('https://www.okx.com' + path);
  const res = await fetch(url, {
    headers: {
      'OK-ACCESS-KEY': OKX_KEY,
      'OK-ACCESS-SIGN': b64,
      'OK-ACCESS-TIMESTAMP': ts,
      'OK-ACCESS-PASSPHRASE': OKX_PASSPHRASE,
      'x-simulated-trading': '0',
    }
  });
  return res.json();
}

async function loadPositions() {
  const wrap = document.getElementById('positions-wrap');
  wrap.innerHTML = '<div class="state-msg"><div class="spinner"></div><span>OKX 포지션 불러오는 중...</span></div>';
  try {
    const data = await okxRequest('/api/v5/account/positions');
    const positions = data.data || [];
    if (!positions.length) {
      wrap.innerHTML = '<div class="state-msg" style="color:var(--muted)"><i class="ti ti-circle-check" style="font-size:28px;color:var(--green)"></i><span>현재 오픈 포지션 없음</span></div>';
      return;
    }
    const rows = positions.map(p => {
      const side    = p.posSide === 'long' ? 'Long' : 'Short';
      const pnl     = parseFloat(p.upl || 0);
      const pnlPct  = parseFloat(p.uplRatio || 0) * 100;
      const entryPx = parseFloat(p.avgPx || 0);
      const markPx  = parseFloat(p.markPx || 0);
      const size    = parseFloat(p.pos || 0);
      const liqPx   = parseFloat(p.liqPx || 0);
      const lever   = p.lever || '—';
      return `
        <div class="trade-row">
          <div>
            <div class="trade-name">${p.instId} <span class="tag ${side === 'Long' ? 'long' : 'short-tag'}">${side}</span> <span class="tag" style="background:rgba(212,138,16,0.12);color:var(--yellow)">${lever}x</span></div>
            <div class="trade-detail">진입가: $${entryPx.toLocaleString()} · 청산가: $${liqPx > 0 ? liqPx.toLocaleString() : '—'} · ${size} cont</div>
          </div>
          <div class="mono">$${markPx.toLocaleString()}</div>
          <div><span class="${pnl >= 0 ? 'pos' : 'neg'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span></div>
          <div><span class="${pnlPct >= 0 ? 'pos' : 'neg'}">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%</span></div>
          <div class="mono" style="color:var(--muted);font-size:10px">${p.ccy || 'USDT'}</div>
        </div>`;
    }).join('');
    wrap.innerHTML = `
      <div class="trade-row header-row"><div>종목</div><div>현재가</div><div>미실현 손익</div><div>수익률</div><div>통화</div></div>
      ${rows}`;
  } catch(e) {
    wrap.innerHTML = `<div class="state-msg"><i class="ti ti-alert-circle" style="font-size:28px;color:var(--red)"></i><div class="error-msg">OKX 연결 실패: ${e.message}</div></div>`;
  }
}

let snapshots = [], trades = [], activeRange = 7, assetChart = null, pnlChart = null;

async function notionQuery(dbId, sorts = []) {
  const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
    body: JSON.stringify({ page_size: 100, sorts })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Notion API ${res.status} — ${txt.slice(0,120)}`);
  }
  return res.json();
}

function prop(page, key, type) {
  const p = page.properties[key];
  if (!p) return null;
  if (type === 'title')     return p.title?.map(t => t.plain_text).join('') || '';
  if (type === 'number')    return p.number ?? null;
  if (type === 'date')      return p.date?.start || null;
  if (type === 'select')    return p.select?.name || null;
  if (type === 'rich_text') return p.rich_text?.map(t => t.plain_text).join('') || '';
  return null;
}

async function loadAll() {
  await Promise.allSettled([loadSnapshots(), loadTrades(), loadPositions()]);
}

async function loadSnapshots() {
  try {
    const d = await notionQuery(DB_SNAPSHOT, [{ property: '스냅샷일', direction: 'ascending' }]);
    snapshots = d.results
      .map(p => ({ date: prop(p,'스냅샷일','date'), total: prop(p,'총자산','number'), pnl: prop(p,'평가손익','number') }))
      .filter(s => s.date && s.total !== null);
    updateBalanceCard();
    renderAssetChart(activeRange);
  } catch(e) { showErr('asset-wrap', e.message); }
}

async function loadTrades() {
  try {
    const d = await notionQuery(DB_TRADES, [{ property: '거래일시', direction: 'descending' }]);
    trades = d.results.map(p => ({
      name:   prop(p,'종목명','title'),
      type:   prop(p,'거래유형','select'),
      date:   prop(p,'거래일시','date'),
      qty:    prop(p,'수량','number'),
      price:  prop(p,'단가','number'),
      total:  prop(p,'총금액','number'),
      pnl:    prop(p,'손익','number'),
      pnlPct: prop(p,'손익률','number'),
      memo:   prop(p,'메모','rich_text'),
    }));
    updateTradeCards();
    renderPnlChart();
    renderTable();
  } catch(e) {
    showErr('pnl-wrap', e.message);
    document.getElementById('trades-table').innerHTML = `<div class="state-msg"><div class="error-msg">${e.message}</div></div>`;
  }
}

function updateBalanceCard() {
  if (!snapshots.length) return;
  const last = snapshots[snapshots.length - 1];
  const el = document.getElementById('c-balance');
  el.textContent = '$' + last.total.toLocaleString();
  document.getElementById('c-balance-sub').textContent = last.date + ' 기준';
}

function updateTradeCards() {
  const sells = trades.filter(t => t.type === '매도' && t.pnl !== null);
  const total = sells.reduce((s,t) => s + t.pnl, 0);
  const wins  = sells.filter(t => t.pnl > 0).length;
  const wr    = sells.length ? Math.round(wins / sells.length * 100) : 0;

  const pe = document.getElementById('c-pnl');
  pe.textContent = (total >= 0 ? '+' : '') + '$' + total.toFixed(2);
  pe.className = 'card-value ' + (total >= 0 ? 'green' : 'red');
  document.getElementById('c-pnl-sub').textContent = sells.length + '건 청산';

  const we = document.getElementById('c-winrate');
  we.textContent = wr + '%';
  we.className = 'card-value ' + (wr >= 50 ? 'green' : 'red');
  document.getElementById('c-winrate-sub').textContent = `${wins}승 ${sells.length - wins}패`;

  document.getElementById('c-trades').textContent = trades.length;
}

function filterRange(arr, days) {
  if (!days) return arr;
  const cut = new Date(); cut.setDate(cut.getDate() - days);
  return arr.filter(s => new Date(s.date) >= cut);
}

function renderAssetChart(days) {
  const wrap = document.getElementById('asset-wrap');
  const data = filterRange(snapshots, days);
  if (!data.length) {
    wrap.innerHTML = `<div class="state-msg"><i class="ti ti-database-off" style="font-size:28px"></i><span>자산 스냅샷 데이터가 없어요<br><small>Claude에게 "오늘 총 자산 XX달러"라고 알려주세요</small></span></div>`;
    return;
  }
  wrap.innerHTML = '<canvas id="assetC" role="img" aria-label="자산 변화 라인 차트">자산 변화 추이</canvas>';
  const ctx = document.getElementById('assetC').getContext('2d');
  const vals = data.map(s => s.total);
  const isUp = vals[vals.length-1] >= vals[0];
  const col  = isUp ? '#00a87a' : '#e03050';
  const grad = ctx.createLinearGradient(0,0,0,260);
  grad.addColorStop(0, isUp ? 'rgba(0,168,122,0.16)' : 'rgba(224,48,80,0.13)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  if (assetChart) assetChart.destroy();
  assetChart = new Chart(ctx, {
    type: 'line',
    data: { labels: data.map(s=>s.date), datasets: [{ data: vals, borderColor: col, borderWidth: 2, fill: true, backgroundColor: grad, tension: 0.4, pointRadius: data.length <= 12 ? 4 : 0, pointHoverRadius: 6, pointBackgroundColor: col, pointBorderColor: '#fff', pointBorderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', borderColor: 'rgba(0,0,0,0.1)', borderWidth: 1, titleColor: '#6b7490', bodyColor: '#1a1e2e', titleFont: { family: 'IBM Plex Mono', size: 10 }, bodyFont: { family: 'IBM Plex Mono', size: 13, weight: '600' }, padding: 10, callbacks: { label: c => ' $' + c.parsed.y.toLocaleString() } }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#a0a8bf', font: { size: 10, family: 'IBM Plex Mono' }, maxTicksLimit: 8 }, border: { color: 'transparent' } },
        y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#a0a8bf', font: { size: 10, family: 'IBM Plex Mono' }, callback: v => '$'+(v>=1000?Math.round(v/1000)+'k':v) }, border: { color: 'transparent' } }
      }
    }
  });
}

function setRange(el, days) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeRange = days;
  renderAssetChart(days);
}

function renderPnlChart() {
  const wrap = document.getElementById('pnl-wrap');
  const sells = trades.filter(t => t.type === '매도' && t.pnl !== null && t.name);
  if (!sells.length) {
    wrap.innerHTML = `<div class="state-msg"><i class="ti ti-chart-bar-off" style="font-size:28px"></i><span>청산된 포지션이 없어요</span></div>`;
    return;
  }
  const byName = {};
  sells.forEach(t => { byName[t.name] = (byName[t.name]||0) + t.pnl; });
  const names = Object.keys(byName);
  const vals  = names.map(n => +byName[n].toFixed(2));
  const h = Math.max(200, names.length * 52 + 60);
  wrap.style.height = h + 'px';
  wrap.innerHTML = '<canvas id="pnlC" role="img" aria-label="종목별 손익 바 차트">종목별 손익</canvas>';
  const ctx = document.getElementById('pnlC').getContext('2d');
  if (pnlChart) pnlChart.destroy();
  pnlChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: names, datasets: [{ data: vals, backgroundColor: vals.map(v=>v>=0?'rgba(0,168,122,0.7)':'rgba(224,48,80,0.7)'), borderColor: vals.map(v=>v>=0?'#00a87a':'#e03050'), borderWidth: 1.5, borderRadius: 6 }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', borderColor: 'rgba(0,0,0,0.1)', borderWidth: 1, titleColor: '#6b7490', bodyColor: '#1a1e2e', titleFont: { family: 'IBM Plex Mono', size: 10 }, bodyFont: { family: 'IBM Plex Mono', size: 13, weight: '600' }, padding: 10, callbacks: { label: c => ' '+(c.parsed.x>=0?'+':'')+'$'+c.parsed.x.toFixed(2) } }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#a0a8bf', font: { size: 10, family: 'IBM Plex Mono' }, callback: v=>(v>=0?'+':'')+'$'+v }, border: { color: 'transparent' } },
        y: { grid: { display: false }, ticks: { color: '#3a4060', font: { size: 12, family: 'Syne', weight: '700' } }, border: { color: 'transparent' } }
      }
    }
  });
}

function renderTable() {
  const el = document.getElementById('trades-table');
  if (!trades.length) {
    el.innerHTML = `<div class="state-msg"><i class="ti ti-inbox" style="font-size:28px"></i><span>매매 내역이 없어요</span></div>`;
    return;
  }
  const rows = trades.slice(0,20).map(t => {
    const pnlHtml = t.pnl !== null ? `<span class="${t.pnl>=0?'pos':'neg'}">${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}</span>` : '<span style="color:var(--muted)">—</span>';
    const pctHtml = t.pnlPct !== null ? `<span class="${t.pnlPct>=0?'pos':'neg'}">${(t.pnlPct*100).toFixed(2)}%</span>` : '—';
    const tag = t.type === '매수' ? `<span class="tag long">LONG</span>` : `<span class="tag closed">CLOSED</span>`;
    return `<div class="trade-row">
      <div><div class="trade-name">${t.name||'—'} ${tag}</div><div class="trade-detail">${t.date||''} · ${t.qty??'?'}주 · $${t.price?.toLocaleString()??'?'}</div></div>
      <div class="mono">${t.total?'$'+t.total.toLocaleString():'—'}</div>
      <div>${pnlHtml}</div>
      <div>${pctHtml}</div>
      <div class="mono" style="color:var(--muted);font-size:10px">${t.memo?t.memo.slice(0,20):'—'}</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="trade-row header-row"><div>종목</div><div>총금액</div><div>손익</div><div>손익률</div><div>메모</div></div>${rows}`;
}

function showErr(id, msg) {
  document.getElementById(id).innerHTML = `<div class="state-msg"><i class="ti ti-alert-circle" style="font-size:28px;color:var(--red)"></i><div class="error-msg">${msg}</div></div>`;
}

loadAll();
</script>
</body>
</html>
